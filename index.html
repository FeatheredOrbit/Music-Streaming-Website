<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Super cool sigma ligma website</title>

    <link rel="icon" href="assets/shared/icons/main.ico?v=2" type="image/x-icon">

    <link rel="stylesheet" href="src/styles/shared.css">
    <link rel="stylesheet" href="src/styles/home.css">


    <style>
        body {
            visibility: hidden;
        }
    </style>

</head>

<body>

    <div class="container" id="song-grid"></div>

    <img class="intro intro-shadow" id="intro">
    <img class="intro" id="intro-shadowless">
    <img id="intro_reversed" class="intro intro-shadow">
    <img id="intro-shadowless_reversed" class="intro">

    <img class="button-pillar" src="assets/shared//foreground/button_pillar_shadowless.png">
    <img class="background" src="assets/shared/background/background.png">
    <img class="pillars pillar-left" src="assets/shared/background/actual_pillar.png">
    <img class="pillars pillar-right" src="assets/shared/background/actual_pillar.png">

    <img class="button home-button" id="home-button" title="Home" src="assets/shared/buttons/home/default.png">
    <img class="button account-button" id="account-button" title="Click to set up account" src="assets/shared/buttons/account/default.png">

    <script>
        const intro = document.getElementById("intro");
        const intro_shadowless = document.getElementById("intro-shadowless");

        intro.offsetHeight;
        intro_shadowless.offsetHeight;

        intro.src = "assets/shared/foreground/intro.gif?t=" + Date.now();
        intro_shadowless.src = "assets/shared/foreground/intro_shadowless.gif?t=" + Date.now();

        window.addEventListener("DOMContentLoaded", function() {
            // Avoids page flickering before the style sheet is loaded
            document.body.style.visibility = "visible";
        });
    </script>

    <script src="src/scripts/shared.js"></script>
    <script type="module" src="src/components/main.jsx"></script>

</body>

</html>
