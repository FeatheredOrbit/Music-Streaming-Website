<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Super cool sigma ligma website</title>

    

    <link rel="preload" href="assets/shared/foreground/intro.gif" as="image" type="image/gif">
    <link rel="preload" href="assets/shared/foreground/intro_shadowless.gif" as="image" type="image/gif">

    <link rel="stylesheet" href="src/styles/shared.css">
    <link rel="stylesheet" href="src/styles/home.css">


    <style>
        body {
            visibility: hidden;
        }
    </style>

</head>

<body>

    <div class="container" id="song-grid"></div>

    <img class="intro intro-shadow" src="assets/shared/foreground/intro.gif">
    <img class="intro" src="assets/shared/foreground/intro_shadowless.gif">

    <img id="intro_reversed" class="intro intro-shadow">
    <img id="intro-shadowless_reversed" class="intro">

    <img class="button-pillar" src="assets/shared//foreground/button_pillar_shadowless.png">

    <img class="background" src="assets/shared/background/background.png">

    <img class="pillars pillar-left" src="assets/shared/background/actual_pillar.png">
    <img class="pillars pillar-right" src="assets/shared/background/actual_pillar.png">

    <img class="button home-button" id="home-button" title="Home" src="assets/shared/buttons/home/default.png">

    <img class="button account-button" id="account-button" title="Click to set up account"
        src="assets/shared/buttons/account/default.png">

    <script>
        window.addEventListener("DOMContentLoaded", function () { document.body.style.visibility = "visible" })
    </script>

    <script src="src/scripts/shared.js"></script>

</body>

</html>
